<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#235D5A">
<title>Экипаж · SMR-26</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Onest:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="apple-touch-icon" href="/icons/icon-180.png">
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#F4ECD9;color:#332A22;font-family:'Onest',sans-serif}
  .wrap{max-width:900px;margin:0 auto;padding:0 16px}
  header{position:sticky;top:0;z-index:20;background:rgba(244,236,217,.92);backdrop-filter:blur(8px);border-bottom:1px solid #D8C7A6}
  .hbar{display:flex;align-items:center;gap:12px;padding:11px 0}
  .back{flex:none;text-decoration:none;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.05em;font-size:13px;color:#235D5A;border:1px solid #235D5A;border-radius:999px;padding:6px 13px}
  .htitle{font-family:'Oswald',sans-serif;font-weight:700;text-transform:uppercase;font-size:18px;color:#235D5A}
  .hero{padding:24px 0 6px}
  .kicker{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.18em;font-size:12px;color:#A86511}
  h1{font-family:'Oswald',sans-serif;font-weight:700;text-transform:uppercase;font-size:34px;margin:6px 0 6px;line-height:1}
  .sub{font-size:14px;color:#675a44;font-style:italic;margin:0 0 18px}
  .panel{background:#fff;border:1px solid #D8C7A6;border-radius:14px;padding:16px;margin-bottom:22px}
  .panel h2{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.04em;font-size:16px;color:#235D5A;margin:0 0 12px}
  label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:#6b5c44;font-family:'Oswald',sans-serif;display:block;margin-bottom:5px}
  input[type=text]{background:#faf6ec;border:1px solid #D8C7A6;border-radius:10px;padding:11px 12px;font-size:15px;font-family:'Onest',sans-serif;color:#332A22;outline:none;width:100%}
  input:focus{border-color:#235D5A}
  .field{margin-bottom:12px}
  .emojis{display:flex;flex-wrap:wrap;gap:6px}
  .em{font-size:20px;width:40px;height:40px;border:1px solid #D8C7A6;background:#faf6ec;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .em.on{border-color:#A86511;background:#fbecd0;box-shadow:0 0 0 2px rgba(200,132,30,.25)}
  .btn{background:#A86511;color:#fff;border:none;border-radius:10px;padding:12px 20px;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.05em;font-size:15px;cursor:pointer;width:100%}
  .btn:disabled{opacity:.5}
  .msg{margin-top:10px;font-size:13.5px;border-radius:10px;padding:10px 12px;display:none}
  .msg.ok{display:block;background:#e7f3ec;color:#1F8A5B;border:1px solid #bfe3cd}
  .msg.err{display:block;background:#fbe9e7;color:#b23b2e;border:1px solid #f0c3bc}
  .count{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.06em;font-size:13px;color:#675a44;margin:0 0 12px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
  .member{background:#fff;border:1px solid #D8C7A6;border-radius:14px;padding:16px 12px;text-align:center}
  .member .av{font-size:38px;line-height:1}
  .member .nm{font-weight:700;font-size:15px;margin-top:8px}
  .member .nt{font-size:12.5px;color:#675a44;margin-top:3px;line-height:1.4}
  .empty{text-align:center;color:#6b5c44;padding:36px 20px;background:#fff;border:1px dashed #D8C7A6;border-radius:14px}
  footer{padding:30px 0 50px;text-align:center;color:#8a7a5f;font-size:12px}
  @media(max-width:520px){h1{font-size:28px}}
</style>
</head>
<body>
<header><div class="wrap hbar">
  <a class="back" href="/">← На сайт</a>
  <div class="htitle">👥 Экипаж</div>
</div></header>

<div class="wrap" role="main">
  <div class="hero">
    <div class="kicker">SMR-26 · Volga Weekend</div>
    <h1>Кто едет</h1>
    <p class="sub">Отметься в экипаже — пусть все видят состав борта.</p>
  </div>

  <div class="panel">
    <h2>Я еду 🙋</h2>
    <div class="field"><label>Имя</label><input id="name" type="text" placeholder="Как тебя зовут" maxlength="40"></div>
    <div class="field"><label>Аватар</label><div class="emojis" id="emojis"></div></div>
    <div class="field"><label>Пара слов (необязательно)</label><input id="note" type="text" placeholder="«за рулём катера», «отвечаю за пиво»…" maxlength="80"></div>
    <button class="btn" id="join">Добавить себя в экипаж</button>
    <div class="msg" id="msg"></div>
  </div>

  <div class="count" id="count">Загружаю экипаж…</div>
  <div class="grid" id="grid"></div>
  <div id="emptyBox"></div>
</div>
<footer>SMR-26 · экипаж · 03–05 июля 2026</footer>

<script>
const $=s=>document.querySelector(s);
const EMO=['🧑','👨','👩','🧔','👱','🦸','🤵','👨‍✈️','🧑‍🚀','🍺','🎣','🎸','📸','🚢','😎','🤠'];
let pickedEmoji=localStorage.getItem('crew_emoji')||'🧑';
const ebox=$('#emojis');
EMO.forEach(e=>{const d=document.createElement('div');d.className='em'+(e===pickedEmoji?' on':'');d.textContent=e;d.onclick=()=>{pickedEmoji=e;localStorage.setItem('crew_emoji',e);[...ebox.children].forEach(c=>c.classList.toggle('on',c.textContent===e));};ebox.appendChild(d);});
$('#name').value=localStorage.getItem('crew_name')||'';

$('#join').onclick=async()=>{
  const name=$('#name').value.trim();
  if(!name){showMsg('Введи имя.','err');return;}
  localStorage.setItem('crew_name',name);
  const fd=new FormData();fd.append('action','add');fd.append('name',name);fd.append('emoji',pickedEmoji);fd.append('note',$('#note').value);
  $('#join').disabled=true;
  try{
    const r=await fetch('/api/crew.php',{method:'POST',body:fd});const j=await r.json();
    if(!j.ok){showMsg(j.error||'Ошибка','err');$('#join').disabled=false;return;}
    showMsg(j.updated?'Обновлено ✓':'Ты в экипаже! 🎉','ok');render(j.items);$('#join').disabled=false;
  }catch(e){showMsg('Ошибка сети','err');$('#join').disabled=false;}
};
function showMsg(t,c){const m=$('#msg');m.className='msg '+c;m.textContent=t;}

function esc(s){return (s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}
function render(items){
  const grid=$('#grid'),empty=$('#emptyBox'),count=$('#count');
  grid.innerHTML='';empty.innerHTML='';
  if(!items||!items.length){count.textContent='';empty.innerHTML='<div class="empty">Пока никто не отметился. Будь первым 🙋</div>';return;}
  count.textContent='В экипаже: '+items.length;
  items.forEach(m=>{
    const d=document.createElement('div');d.className='member';
    d.innerHTML=`<div class="av">${esc(m.emoji||'🧑')}</div><div class="nm">${esc(m.name)}</div>${m.note?`<div class="nt">${esc(m.note)}</div>`:''}`;
    grid.appendChild(d);
  });
}
async function load(){try{const r=await fetch('/api/crew.php?action=list&t='+Date.now());const j=await r.json();render(j.items);}catch(e){render([]);}}
load();setInterval(load,30000);
</script>
</body>
</html>
