  .fchip{font-size:12.5px;font-family:'Oswald',sans-serif;letter-spacing:.03em;background:#fff;border:1px solid #D8C7A6;border-radius:999px;padding:6px 12px;cursor:pointer;color:#5a4b3a}

const map = L.map('map',{scrollWheelZoom:false}).setView([53.193,50.095],14);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19, attribution:'© OpenStreetMap'}).addTo(map);
const yandex = q => 'https://yandex.ru/maps/?text=' + encodeURIComponent(q);

const markers=[]; const downtown=[];
PLACES.forEach((p,i)=>{
  if(!p.ll){ markers.push(null); return; }
  const col=CATS[p.cat].c;
  const icon=L.divIcon({html:`<div class="pin" style="background:${col}"><span>${p.emoji}</span></div>`,className:'',iconSize:[30,30],iconAnchor:[15,28],popupAnchor:[0,-26]});
  const m=L.marker(p.ll,{icon});
  m.bindPopup(`<div class="lp-title">${p.emoji} ${p.title}</div><div class="lp-sub">${p.sub}</div><a class="lp-link" target="_blank" rel="noopener" href="${yandex(p.q)}">Яндекс.Карты ↗</a>`);
  m.addTo(map); markers.push(m);
  if(p.cat!=='fly') downtown.push(p.ll);
});
map.fitBounds(downtown,{padding:[40,40]});

const list=document.getElementById('list'); const listEls=[];
PLACES.forEach((p,i)=>{
  const col=CATS[p.cat].c;
  const el=document.createElement('div');el.className='pl';
  el.innerHTML=`<div class="t">${p.emoji} ${p.title}</div><div class="s">${p.sub}</div><span class="b" style="background:${col}">${p.label}</span>`;
  el.onclick=()=>{ if(p.ll){map.flyTo(p.ll,16);markers[i].openPopup();window.scrollTo({top:0,behavior:'smooth'});} else {window.open(yandex(p.q),'_blank');} };
  list.appendChild(el); listEls.push(el);
});

// фильтр по категориям
let activeCat='all';
const fbar=document.getElementById('filters');
[['all','Все']].concat(Object.keys(CATS).map(k=>[k,CATS[k].n])).forEach(([k,label])=>{
  const b=document.createElement('button');b.className='fchip'+(k==='all'?' on':'');b.textContent=label;
  b.onclick=()=>{activeCat=k;[...fbar.children].forEach(c=>c.classList.toggle('on',c===b));applyFilter();};
  fbar.appendChild(b);
});
function applyFilter(){
  PLACES.forEach((p,i)=>{
    const show=activeCat==='all'||p.cat===activeCat;
    const m=markers[i];
    if(m){ if(show){if(!map.hasLayer(m))m.addTo(map);}else{if(map.hasLayer(m))map.removeLayer(m);} }
    if(listEls[i]) listEls[i].style.display=show?'':'none';
  });
}

window.addEventListener('load',function(){setTimeout(function(){try{map.invalidateSize();map.fitBounds(downtown,{padding:[40,40]});}catch(e){}},250);});
